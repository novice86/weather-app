<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open-Meteo Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Weather Dashboard</h1>
        <div id="errorBox" class="error hidden"></div>
    </header>

    <main>
        <h2 id="locationName">Loading default location...</h2>
        
        <nav class="tabs">
            <button class="tab-btn active" data-view="temperature">Temperature</button>
            <button class="tab-btn" data-view="conditions">Conditions</button>
        </nav>

        <section id="contentArea" class="content-card">
            <div class="loader" id="loader">Fetching data...</div>
            <div id="dataContainer"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
